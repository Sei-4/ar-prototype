<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accounts Receivable</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#1e293b;-webkit-font-smoothing:antialiased;font-size:13px}
button{font-family:inherit;cursor:pointer}input,select{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}::-webkit-scrollbar-track{background:transparent}
svg.ic{display:inline-block;vertical-align:middle;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* HEADER */
.header{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 20px}
.header h1{font-size:18px;font-weight:700;color:#1e293b}
.header-stats{display:flex;gap:20px;margin-top:6px;font-size:13px;font-weight:600}
.stat-overdue{color:#dc2626}.stat-open{color:#1e293b}.stat-credit{color:#059669}
.stat-label{font-weight:400;color:#64748b;font-size:12px;margin-right:4px}

/* BUCKETS */
.bucket-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 20px 8px}
.bucket{border-radius:12px;text-align:left;border:2px solid transparent;overflow:hidden;cursor:pointer;transition:all .2s}
.bucket:hover{filter:brightness(0.97)}
.bucket-head{padding:10px 16px 6px;font-size:13px;font-weight:700}
.bucket-body{padding:4px 16px 14px}
.bucket-row{display:flex;justify-content:space-between;align-items:flex-start}
.bucket-val{font-size:20px;font-weight:800}
.bucket-label{font-size:11px;opacity:.7}
.bucket-footer{display:flex;align-items:center;gap:6px;padding-top:8px;margin-top:8px;font-size:11px;opacity:.7}
.bucket-footer strong{opacity:1}
.bucket.active{box-shadow:0 0 0 3px rgba(0,0,0,.12);transform:scale(1.02)}
.b-green{background:#dcfce7;border-color:#dcfce7}.b-green .bucket-head,.b-green .bucket-val,.b-green .bucket-footer strong{color:#15803d}.b-green .bucket-label,.b-green .bucket-footer{color:#166534}
.b-amber{background:#fef3c7;border-color:#fef3c7}.b-amber .bucket-head,.b-amber .bucket-val,.b-amber .bucket-footer strong{color:#b45309}.b-amber .bucket-label,.b-amber .bucket-footer{color:#92400e}
.b-orange{background:#ffedd5;border-color:#ffedd5}.b-orange .bucket-head,.b-orange .bucket-val,.b-orange .bucket-footer strong{color:#c2410c}.b-orange .bucket-label,.b-orange .bucket-footer{color:#9a3412}
.b-red{background:#fee2e2;border-color:#fee2e2}.b-red .bucket-head,.b-red .bucket-val,.b-red .bucket-footer strong{color:#dc2626}.b-red .bucket-label,.b-red .bucket-footer{color:#991b1b}
.bucket.active.b-green{border-color:#16a34a}.bucket.active.b-amber{border-color:#d97706}.bucket.active.b-orange{border-color:#ea580c}.bucket.active.b-red{border-color:#dc2626}

/* SEARCH / FILTER ROW */
.search-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 20px}
.toolbar-left{display:flex;align-items:center;gap:8px;min-height:32px}
.batch-dropdown-wrap{position:relative;display:inline-flex;align-items:center}
.batch-dropdown{appearance:none;-webkit-appearance:none;font-family:inherit;font-size:12px;font-weight:500;padding:6px 32px 6px 12px;border-radius:8px;border:1px solid #cbd5e1;background:#fff;color:#475569;cursor:pointer;transition:all .15s}
.batch-dropdown:not(:disabled):hover{border-color:#94a3b8;background:#f8fafc}
.batch-dropdown:disabled{opacity:.45;cursor:not-allowed;background:#f8fafc}
.batch-dropdown:not(:disabled):focus{outline:none;border-color:#93c5fd;box-shadow:0 0 0 2px rgba(59,130,246,.12)}
.batch-dropdown-arrow{position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:#64748b}
.batch-sel-count{font-size:11px;font-weight:600;color:#2563eb;background:#eff6ff;border:1px solid #bfdbfe;border-radius:99px;padding:1px 7px;white-space:nowrap}
.toolbar-right{display:flex;align-items:center;gap:8px}
.search-wrap{position:relative;flex:1;max-width:320px}
.search-wrap input{width:100%;padding:6px 12px 6px 32px;font-size:13px;border:1px solid #cbd5e1;border-radius:8px;outline:none;background:#fff}
.search-wrap input:focus{border-color:#93c5fd;box-shadow:0 0 0 2px #bfdbfe}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:14px}
.filter-btn{display:flex;align-items:center;gap:4px;padding:6px 10px;font-size:12px;border-radius:8px;border:1px solid #cbd5e1;background:#fff;color:#475569}
.filter-btn.active{background:#eff6ff;border-color:#93c5fd;color:#1d4ed8}
.filter-btn .count{background:#2563eb;color:#fff;font-size:10px;border-radius:99px;width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;margin-left:2px}
.clear-btn{font-size:12px;color:#64748b;background:none;border:none;text-decoration:underline}

/* FILTER PANEL */
.filter-panel{margin:4px 20px 0;padding:12px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;display:none}
.filter-panel.show{display:block}
.filter-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:8px}
.filter-section-label{font-size:11px;font-weight:600;color:#64748b;margin-bottom:6px}
.chip-row{display:flex;flex-wrap:wrap;gap:4px}
.chip{padding:2px 10px;font-size:11px;border-radius:99px;border:1px solid #cbd5e1;background:#fff;color:#475569;cursor:pointer;transition:all .15s}
.chip.active{background:#2563eb;border-color:#2563eb;color:#fff}
.range-row{display:flex;gap:24px;padding-top:8px;margin-top:8px;border-top:1px solid #f1f5f9;flex-wrap:wrap}
.range-row input{width:80px;font-size:12px;border:1px solid #cbd5e1;border-radius:4px;padding:4px 8px;outline:none}
.range-row input:focus{border-color:#93c5fd}
.range-row input[type=date]{width:130px}

/* TABLE */
.table-wrap{margin:8px 20px 24px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.group-header{display:flex;align-items:center;gap:8px;margin:12px 20px 8px}
.group-header span.glabel{font-size:13px;font-weight:700;color:#334155}
.group-header span.meta{font-size:11px;color:#94a3b8}
.group-header .line{flex:1;border-top:1px solid #e2e8f0;margin-left:8px}
table{width:100%;border-collapse:collapse;min-width:1350px}
thead th{padding:10px 8px;text-align:left;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:1px solid #e2e8f0;background:#f8fafc}
thead th:hover{color:#334155}
thead th .sort{color:#2563eb;font-size:10px;margin-left:2px}
thead th .sort-hint{visibility:hidden;color:#94a3b8;font-size:10px;margin-left:2px}
thead th:hover .sort-hint{visibility:visible}
tbody td{padding:8px 10px;vertical-align:middle}
tbody tr{border-bottom:1px solid #f1f5f9;transition:background .1s;position:relative}
.col-sticky{position:sticky;z-index:1}
thead .col-sticky{z-index:3;background:#f8fafc}
tbody .col-sticky{background:#fff}
tbody tr:hover .col-sticky{background:#f8fafc}
tbody tr.selected .col-sticky{background:#eff6ff}
.loc-parent-row .col-sticky{background:#fafbff}
.loc-sub-row .col-sticky{background:#f5f7ff}
.loc-sub-row:hover .col-sticky{background:#eef1ff}
tbody tr:hover{background:#f8fafc}
tbody tr.selected{background:#eff6ff}
.name-overdue{font-weight:700;color:#1e293b;white-space:nowrap;font-size:13px}
.name-normal{font-weight:600;color:#1e293b;white-space:nowrap;font-size:13px}
.badge{display:inline-block;padding:1px 6px;font-size:11px;font-weight:500;border-radius:4px;white-space:nowrap;margin:1px}
.svc-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:4px;font-size:11px;font-weight:700;margin-right:3px;position:relative}
.svc-badge .tip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);padding:4px 8px;background:#1e293b;color:#fff;font-size:11px;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:50;font-weight:400}
.svc-badge:hover .tip{opacity:1}
.comm-icon{position:relative;cursor:default;font-size:15px}
.comm-icon .tip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);padding:4px 8px;background:#1e293b;color:#fff;font-size:11px;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:50}
.comm-icon:hover .tip{opacity:1}
.contact-cell{cursor:pointer;position:relative}
.contact-cell .edit-hint{position:absolute;top:-2px;right:-2px;opacity:0;transition:opacity .15s;background:#f1f5f9;border-radius:4px;padding:1px 3px;font-size:10px}
.contact-cell:hover .edit-hint{opacity:1}
.contact-name{font-size:12px;font-weight:500;color:#1e293b}
.contact-email{font-size:11px;color:#2563eb}
.contact-phone{font-size:11px;color:#64748b}
.edit-form input{width:100%;font-size:12px;border:1px solid #93c5fd;border-radius:4px;padding:2px 6px;margin-bottom:3px;outline:none}
.edit-btns{display:flex;gap:4px;margin-top:2px}
.edit-btns button{font-size:11px;padding:2px 8px;border-radius:4px;border:none}
.edit-save{background:#2563eb;color:#fff}.edit-cancel{background:#e2e8f0;color:#475569}
.money{font-size:13px;font-weight:500;font-variant-numeric:tabular-nums;color:#1e293b}
.money-overdue{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;color:#dc2626}
.money-credit{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;color:#059669}
.money-open{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;color:#1e293b}
.dash{color:#d1d5db}
.note-cell{max-width:180px;cursor:pointer}
.note-cell:hover .note-text{color:#2563eb;text-decoration:underline}
.note-text{font-size:12px;color:#334155;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.note-date{font-size:11px;color:#94a3b8;margin-top:2px}
.billing-note-icon{color:#94a3b8;font-size:15px;cursor:pointer;position:relative;display:inline-block}
.billing-note-icon.has-notes{color:#2563eb}
.billing-note-icon .tip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);padding:6px 10px;background:#1e293b;color:#fff;font-size:12px;border-radius:6px;white-space:pre-line;opacity:0;pointer-events:none;transition:opacity .15s;z-index:50;max-width:260px;text-align:left;line-height:1.4}
.billing-note-icon:hover .tip{opacity:1}
.status-pill{font-size:11px;font-weight:500;padding:2px 8px;border-radius:9999px;white-space:nowrap;display:inline-block;text-align:center}
.status-pill-wrapped{white-space:normal;line-height:1.4}
.status-active{background:#dcfce7;color:#15803d}
.status-suspended-np{background:#fee2e2;color:#991b1b}
.status-suspended-v{background:#fef3c7;color:#92400e}
.empty-msg{padding:40px 0;text-align:center;color:#94a3b8;font-size:13px}

input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:#2563eb}

/* BATCH ACTIONS (inline toolbar) */
.batch-count{font-size:13px;font-weight:600;color:#1e293b}
.batch-divider{width:1px;height:16px;background:#e2e8f0}
.batch-btn{font-size:12px;padding:5px 12px;border-radius:8px;color:#fff;border:none;font-weight:500;cursor:pointer}
.batch-close{background:none;border:none;color:#94a3b8;font-size:16px;line-height:1;cursor:pointer;padding:0 2px}
.batch-close:hover{color:#1e293b}

/* ACTION COLUMN BUTTONS */
.action-btn{font-size:11px;font-weight:500;padding:4px 10px;border-radius:6px;border:1px solid;cursor:pointer;white-space:nowrap;transition:background .12s}
.action-btn-view{background:#f8fafc;color:#1e293b;border-color:#cbd5e1}
.action-btn-view:hover{background:#f1f5f9}
.action-btn-resume{background:#d1fae5;color:#065f46;border-color:#6ee7b7}
.action-btn-resume:hover{background:#a7f3d0}
.action-btn-pay{background:#dbeafe;color:#1e40af;border-color:#93c5fd}
.action-btn-pay:hover{background:#bfdbfe}
.kebab-wrap{position:relative;display:inline-flex}
.kebab-btn{background:none;border:1px solid #cbd5e1;border-radius:6px;padding:2px 7px;cursor:pointer;display:flex;align-items:center;justify-content:center;height:28px;color:#64748b}
.kebab-btn:hover{background:#f1f5f9;border-color:#94a3b8}
.kebab-menu{position:absolute;right:0;top:calc(100% + 4px);background:#fff;border:1px solid #e2e8f0;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:200;min-width:150px;padding:4px}
.kebab-item{display:block;width:100%;text-align:left;padding:7px 12px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;border-radius:5px;color:#1e293b;white-space:nowrap;font-family:inherit}
.kebab-item:hover{background:#f8fafc}
.kebab-item-warn{color:#dc2626}
.kebab-item-warn:hover{background:#fee2e2}
.batch-close{background:none;border:none;color:#94a3b8;font-size:14px;margin-left:4px}
.batch-close:hover{color:#fff}

/* ===== SIDE PANEL ===== */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.08);z-index:49;opacity:0;pointer-events:none;transition:opacity .2s}
.panel-overlay.show{opacity:1;pointer-events:auto}
.panel{position:fixed;top:0;right:0;bottom:0;width:50vw;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.12);border-left:1px solid #e2e8f0;z-index:50;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease-out;overflow:hidden;contain:layout}
.panel.show{transform:translateX(0)}

.panel-header{padding:14px 20px 0;border-bottom:1px solid #e5e7eb;flex-shrink:0}
.panel-header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.panel-name-block{flex:1;min-width:0}
.panel-title-with-labels{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap}
.panel-title-with-labels h2{font-size:16px;font-weight:700;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.panel-lbl-inline{font-size:10px;font-weight:500;padding:2px 8px;border-radius:9999px;background:#eff6ff;color:#1d4ed8;white-space:nowrap;margin-top:2px}
.panel-header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.panel-status{font-size:10px;font-weight:600;padding:2px 8px;border-radius:9999px;border:1px solid}
.ps-active{background:#ecfdf5;color:#047857;border-color:#a7f3d0}
.ps-snp{background:#fef2f2;color:#b91c1c;border-color:#fecaca}
.ps-sv{background:#fffbeb;color:#b45309;border-color:#fde68a}
.panel-contact-info{display:flex;flex-direction:column;gap:3px;margin-top:6px;margin-bottom:12px}
.panel-contact-info a{font-size:12px;color:#4b5563;text-decoration:none;display:flex;align-items:center;gap:5px}
.panel-contact-info a:hover{color:#2563eb;text-decoration:underline}
.close-btn{padding:4px;border-radius:4px;border:none;background:none;cursor:pointer;color:#9ca3af}
.close-btn:hover{background:#f3f4f6}
.panel-tabs{display:flex;border-top:1px solid #f3f4f6}
.panel-tab{padding:10px 14px;font-size:12px;font-weight:500;border:none;background:none;border-bottom:2px solid transparent;color:#9ca3af;cursor:pointer;white-space:nowrap}
.panel-tab:hover{color:#6b7280}
.panel-tab.active{border-bottom-color:#111827;color:#111827}
.panel-tab-body{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.panel-scroll{flex:1;overflow-y:auto}

/* Overview tab */
.overview-inner{padding:20px;display:flex;flex-direction:column;gap:20px}
.sh{display:flex;align-items:center;gap:6px;margin-bottom:12px}
.sh h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.sh.violet svg{color:#a78bfa}.sh.violet h3{color:#8b5cf6}
.sh.blue svg{color:#60a5fa}.sh.blue h3{color:#3b82f6}
.sh.gray svg{color:#9ca3af}.sh.gray h3{color:#9ca3af}
.hl-box{background:rgba(139,92,246,.05);border:1px solid rgba(139,92,246,.15);border-radius:8px;padding:12px}
.hl-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.hl-list li{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:#374151;line-height:1.5}
.hl-dot{width:4px;height:4px;border-radius:50%;background:#a78bfa;margin-top:7px;flex-shrink:0}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.blk{border-radius:8px;padding:12px}
.blk.bl{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.15)}
.blk.gr{background:#f9fafb}
.bh{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.bh span{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.bh.bl svg,.bh.bl span{color:#60a5fa}
.bh.gr svg,.bh.gr span{color:#9ca3af}
.cn{font-size:14px;font-weight:500;color:#111827}
.ct{font-size:11px;color:#6b7280;margin-top:2px}
.ci{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.cr{font-size:11px;color:#4b5563;display:flex;align-items:center;gap:6px}
.cr svg{color:#9ca3af;flex-shrink:0}
.nt{font-size:12px;color:#374151;line-height:1.6}
.tb{background:#f9fafb;border-radius:8px;padding:12px;margin-top:12px}
.tb-title{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.tg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px 24px;font-size:12px}
.tg .tl{color:#9ca3af}.tg .tv{font-weight:500;color:#1f2937}
.warn{margin-top:10px;display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px}
.warn svg{color:#f59e0b;flex-shrink:0}
.warn span{font-size:11px;color:#b45309}
.warn strong{font-weight:600}

/* Mini aging buckets in panel */
.mini-bucket-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.mini-bucket{border-radius:8px;border:2px solid transparent;overflow:hidden}
.mini-bucket-head{padding:7px 10px 4px;font-size:11px;font-weight:700}
.mini-bucket-body{padding:2px 10px 10px}
.mini-bucket-val{font-size:16px;font-weight:800}
.mini-bucket-sub{font-size:10px;opacity:.75;margin-top:2px}

/* Payment Policy grid */
.policy-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 24px}
.policy-label{font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.policy-value{font-size:12px;font-weight:500;color:#1f2937}

/* Editable notes */
.notes-section{border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
.notes-section-header{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#f9fafb;border-bottom:1px solid #f3f4f6}
.notes-section-title{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em}
.notes-edit-btn{font-size:11px;font-weight:500;color:#6b7280;background:none;border:none;cursor:pointer;padding:2px 8px;border-radius:4px}
.notes-edit-btn:hover{background:#e5e7eb;color:#1f2937}
.notes-body{padding:12px}
.notes-text{font-size:12px;color:#374151;line-height:1.6;white-space:pre-wrap}
.notes-empty{font-size:12px;color:#9ca3af;font-style:italic}
.notes-textarea{width:100%;font-size:12px;border:1px solid #93c5fd;outline:none;resize:none;font-family:inherit;line-height:1.6;color:#374151;background:#fff;border-radius:6px;padding:8px 10px;box-shadow:0 0 0 2px rgba(59,130,246,.1)}
.notes-save-row{display:flex;justify-content:flex-end;gap:6px;margin-top:8px}

/* Phone input formatter */
.phone-input-wrap{position:relative}
.phone-input-placeholder{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:12px;color:#d1d5db;pointer-events:none;letter-spacing:.5px}

/* Contacts tab */
.contacts-toolbar{display:flex;align-items:center;gap:8px;padding:10px 20px;border-bottom:1px solid #f3f4f6;flex-shrink:0}
.contacts-search-wrap{position:relative;flex:1}
.contacts-search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9ca3af}
.contacts-search-input{width:100%;font-size:12px;padding:6px 10px 6px 30px;border:1px solid #e2e8f0;border-radius:7px;outline:none;font-family:inherit}
.contacts-search-input:focus{border-color:#93c5fd;box-shadow:0 0 0 2px rgba(59,130,246,.1)}
.tab-list-header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 10px;border-bottom:1px solid #f3f4f6;flex-shrink:0}
.tab-list-title{font-size:12px;font-weight:600;color:#6b7280}

function toggleArr(a,v){return a.includes(v)?a.filter(x=>x!==v):[...a,v]}

function getFiltered(){
  return customers.filter(c=>{
    if(state.search){
      const q=state.search.toLowerCase();
      const locs=customerLocations[c.id]||[];
      const locMatch=locs.some(l=>l.name.toLowerCase().includes(q)||(l.address+', '+l.city).toLowerCase().includes(q));
      if(!c.name.toLowerCase().includes(q)&&!c.contact.name.toLowerCase().includes(q)&&!c.contact.email.toLowerCase().includes(q)&&!locMatch)return false;
    }
    if(state.selectedBucket&&(c.aging[state.selectedBucket]||0)===0)return false;
    if(state.businessFilter.length&&!state.businessFilter.includes(c.businessType))return false;
    if(state.labelFilter.length&&!state.labelFilter.some(l=>c.labels.includes(l)))return false;
    if(state.serviceFilter.length&&!state.serviceFilter.some(s=>c.services.includes(s)))return false;
    if(state.commFilter.length&&!state.commFilter.includes(c.commPref))return false;
    if(state.termsFilter.length&&!state.termsFilter.includes(c.netTerms))return false;
    if(state.statusFilter.length&&!state.statusFilter.includes(c.status))return false;
    if(state.overdueMin&&c.overdueBalance<Number(state.overdueMin))return false;
    if(state.overdueMax&&c.overdueBalance>Number(state.overdueMax))return false;
    if(state.daysPastDue&&c.maxDaysPastDue<Number(state.daysPastDue))return false;
    if(state.customerFilter){const q=state.customerFilter.toLowerCase();if(!c.name.toLowerCase().includes(q))return false;}
    if(state.billingContactFilter){const q=state.billingContactFilter.toLowerCase();if(!c.contact.name.toLowerCase().includes(q)&&!c.contact.email.toLowerCase().includes(q))return false;}
    if(state.policyFilter.length&&!state.policyFilter.includes(c.paymentPolicy))return false;
    return true;
  });
}
function getSorted(list){
  if(!state.sortKey)return[...list];
  return[...list].sort((a,b)=>{
    const k=state.sortKey,d=state.sortDir;
    if(["name","businessType","commPref","status"].includes(k))return d==="asc"?a[k].localeCompare(b[k]):b[k].localeCompare(a[k]);
    if(k==="contact")return d==="asc"?a.contact.name.localeCompare(b.contact.name):b.contact.name.localeCompare(a.contact.name);
    let av,bv;
    if(k==="netTerms"){av=parseInt(a.netTerms.replace(/\D/g,""));bv=parseInt(b.netTerms.replace(/\D/g,""))}
    else if(["current","31-60","61-90","90+"].includes(k)){av=a.aging[k]||0;bv=b.aging[k]||0}
    else{av=a[k]||0;bv=b[k]||0}
    return d==="asc"?av-bv:bv-av;
  });
}
function getGrouped(sorted){
  if(state.groupBy==="none")return[{label:null,rows:sorted}];
  const map={};
  sorted.forEach(c=>{
    let keys;
    if(state.groupBy==="businessType")keys=[c.businessType];
    else if(state.groupBy==="labels")keys=c.labels.length?c.labels:["No Label"];
    else if(state.groupBy==="agingBucket"){if((c.aging["90+"]||0)>0)keys=["90+ Days"];else if((c.aging["61-90"]||0)>0)keys=["61–90 Days"];else if((c.aging["31-60"]||0)>0)keys=["31–60 Days"];else if(c.overdueBalance>0)keys=["Current"];else keys=["No Overdue"]}
    else if(state.groupBy==="netTerms")keys=[c.netTerms];
    else if(state.groupBy==="status")keys=[c.status];
    else keys=["Other"];
    keys.forEach(k=>{if(!map[k])map[k]=[];map[k].push(c)});
  });
  return Object.entries(map).map(([k,rows])=>({label:k,rows}));
}

  return`<td></td>`;
}

            ${state.editingBillingNotes

                 <div class="notes-save-row"><button class="cbtn" onclick="setState({editingBillingNotes:false})">Cancel</button><button class="sbtn" onclick="saveBillingNotes(${pc.id})">Save</button></div>`
              :`<div style="font-size:13px;color:#374151;line-height:1.6;white-space:pre-wrap">${billingNotes?esc(billingNotes):`<span class="notes-empty">No billing notes</span>`}</div>`}
          </div>
        </div>`;
      }

      // Account Notes
      h+=`<div style="border:0.5px solid #d0d0d0;border-radius:8px;overflow:hidden">
        <div style="background:#f9fafb;padding:8px 16px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#6b7280">Account Notes</span>
          ${state.editingAccountNotes
            ?`<button class="notes-edit-btn" onclick="setState({editingAccountNotes:false})">Cancel</button>`
            :`<button class="notes-edit-btn" style="font-size:12px;color:#9ca3af" onclick="setState({editingAccountNotes:true,tempAccountNotes:${JSON.stringify(accountNotes||'')}})">Edit</button>`}
        </div>
        <div style="padding:12px 16px 14px">
          ${state.editingAccountNotes
            ?`<textarea class="notes-textarea" rows="4" oninput="state.tempAccountNotes=this.value" placeholder="Add account notes...">${esc(state.tempAccountNotes)}</textarea>
               <div class="notes-save-row"><button class="cbtn" onclick="setState({editingAccountNotes:false})">Cancel</button><button class="sbtn" onclick="saveAccountNotes(${pc.id})">Save</button></div>`
            :`<div style="font-size:13px;color:#374151;line-height:1.6;white-space:pre-wrap">${accountNotes?esc(accountNotes):`<span class="notes-empty">No account notes</span>`}</div>`}
        </div>
      </div>`;

      h+=`</div></div></div>`;
    }

    // ── CONTACTS TAB ──────────────────────────────────────────────────────────
    else if(state.panelTab==='contacts'){
      const allContacts=(customerContacts[pc.id]||[]).map(ct=>{
        const override=state.contactsData[pc.id+'_ct_'+ct.id];
        return override!==undefined?override:ct;
      });
      const addedContacts=(state.contactsData[pc.id+'_added']||[]);
      const combinedContacts=[...allContacts,...addedContacts];
      const q=state.contactSearch.toLowerCase();
      const visibleContacts=q?combinedContacts.filter(ct=>ct.name.toLowerCase().includes(q)||ct.title.toLowerCase().includes(q)||ct.email.toLowerCase().includes(q)||ct.phone.includes(q)):combinedContacts;
      const pinnedContacts=visibleContacts.filter(ct=>ct.pinned&&!ct.disabled);
      const regularContacts=visibleContacts.filter(ct=>!ct.pinned&&!ct.disabled);
      const disabledContacts=visibleContacts.filter(ct=>ct.disabled);

      const pinIcon='<svg class="ic" width="10" height="10" viewBox="0 0 24 24" style="stroke:#2563eb;fill:none"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>';

      h+=`<div class="panel-tab-body" style="overflow:hidden;display:flex;flex-direction:column">`;

      // Toolbar: search + add button (hide Add Contact button when form is open)
      h+=`<div class="contacts-toolbar">
        <div class="contacts-search-wrap">
          <svg class="ic" width="13" height="13" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="contacts-search-input" placeholder="Search contacts..." value="${esc(state.contactSearch)}" oninput="setState({contactSearch:this.value})">
        </div>
        ${!state.addingContact?`<button class="tab-add-btn" onclick="setState({addingContact:true,editingContactId:null,contactSearch:''})"><svg class="ic" width="12" height="12" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Contact</button>`:''}
      </div>`;

      // Add contact form (above list, count below form)
      if(state.addingContact){
        h+=`<div class="add-contact-form">
          <div style="font-size:11px;font-weight:600;color:#374151;margin-bottom:10px">New Contact</div>
          <div class="fc-grid" style="margin-bottom:8px">
            <input id="nc-name" placeholder="Full name">
            <input id="nc-title" placeholder="Title / Role">
            <input id="nc-phone" placeholder="000-000-0000" oninput="fmtPhoneInput(this)" maxlength="12">
            <input id="nc-email" placeholder="Email address">
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:11px;color:#9ca3af">${combinedContacts.length} contact${combinedContacts.length!==1?'s':''}</span>
            <div style="display:flex;gap:6px">
              <button class="cbtn" onclick="setState({addingContact:false})">Cancel</button>
              <button class="sbtn" onclick="addNewContact(${pc.id})">Add Contact</button>
            </div>
          </div>
        </div>`;
      }

      h+=`<div class="panel-scroll">`;
      const renderContact=(ct)=>{
        const initials=ct.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
        const isEditing=state.editingContactId===ct.id;
        const inputStyle='font-size:12px;padding:6px 8px;border:1px solid #e2e8f0;border-radius:5px;outline:none;font-family:inherit;width:100%';
        if(isEditing){
          return`<div class="contact-row" style="background:#f0f6ff;border-left:3px solid #2563eb">
            <div class="contact-avatar">${initials}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:11px;font-weight:600;color:#2563eb;margin-bottom:8px">Edit Contact</div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
                <input id="ec2-name" value="${esc(ct.name)}" placeholder="Full name" style="${inputStyle}">
                <input id="ec2-title" value="${esc(ct.title)}" placeholder="Title" style="${inputStyle}">
                <input id="ec2-phone" value="${esc(ct.phone+(ct.ext?' ext. '+ct.ext:''))}" placeholder="000-000-0000" oninput="fmtPhoneInput(this)" maxlength="16" style="${inputStyle}">
                <input id="ec2-email" value="${esc(ct.email)}" placeholder="Email" style="${inputStyle}">
              </div>
              <div style="display:flex;justify-content:flex-end;gap:6px">
                <button class="cbtn" onclick="setState({editingContactId:null})">Cancel</button>
                <button class="sbtn" onclick="saveContactEdit(${pc.id},'${ct.id}')">Save</button>
              </div>
            </div>
          </div>`;
        }
        return`<div class="contact-row ${ct.pinned?'pinned':''} ${ct.disabled?'disabled':''}">
          <div class="contact-avatar" style="${ct.pinned?'border:2px solid #bfdbfe;':''}">${initials}</div>
          <div style="flex:1;min-width:0">
            <div class="contact-name-row">
              <span class="contact-name">${esc(ct.name)}</span>
              ${ct.pinned?`<span class="contact-pin-badge">${pinIcon} ${esc(ct.role)}</span>`:''}
            </div>
            <div class="contact-role">${esc(ct.title)}</div>
            <div class="contact-info-row">
              <a href="tel:${esc(ct.phone)}">${phoneIcon} ${esc(ct.phone)}${ct.ext?` ext. ${esc(ct.ext)}`:''}</a>
              <a href="mailto:${esc(ct.email)}" class="email-link">${emailIcon} ${esc(ct.email)}</a>
            </div>
          </div>
          <div class="contact-row-actions">
            ${!ct.pinned?`<button class="contact-act-btn" onclick="pinContact(${pc.id},'${ct.id}')">Pin</button>`:`<button class="contact-act-btn" style="color:#2563eb" onclick="pinContact(${pc.id},'${ct.id}')">Unpin</button>`}
            <button class="contact-act-btn" onclick="setState({editingContactId:'${ct.id}',addingContact:false})">Edit</button>
            <button class="contact-act-btn danger" onclick="toggleContactDisabled(${pc.id},'${ct.id}')">${ct.disabled?'Enable':'Disable'}</button>
          </div>
        </div>`;
      };

      if(pinnedContacts.length) pinnedContacts.forEach(ct=>{h+=renderContact(ct)});
      if(regularContacts.length){
        if(pinnedContacts.length) h+=`<div class="section-divider">Other Contacts</div>`;
        regularContacts.forEach(ct=>{h+=renderContact(ct)});
      }
      if(disabledContacts.length){
        h+=`<div class="section-divider">Disabled</div>`;
        disabledContacts.forEach(ct=>{h+=renderContact(ct)});
      }
      if(!visibleContacts.length) h+=`<div class="empty-msg">${q?'No contacts match your search.':'No contacts yet.'}</div>`;
      if(!state.addingContact) h+=`<div style="padding:10px 20px;font-size:11px;color:#9ca3af">${combinedContacts.length} contact${combinedContacts.length!==1?'s':''}</div>`;
      h+=`</div></div>`;
    }

    // ── PAYMENT METHODS TAB ───────────────────────────────────────────────────
    else if(state.panelTab==='payments'){
      const pcCards=getCards(pc.id);
      const nowY=(new Date()).getFullYear(),nowM=(new Date()).getMonth()+1;
      const isExpired=c=>c.expYear<nowY||(c.expYear===nowY&&c.expMonth<nowM);
      const brandCls=b=>({Visa:'cb-visa',Mastercard:'cb-mc',Amex:'cb-amex',Discover:'cb-disc'}[b]||'cb-visa');
      const cardQ=state.panelCardSearch.toLowerCase();
      const filteredCards=cardQ?pcCards.filter(c=>c.brand.toLowerCase().includes(cardQ)||c.last4.includes(cardQ)||c.name.toLowerCase().includes(cardQ)):pcCards;
      h+=`<div class="panel-tab-body" style="overflow:hidden;display:flex;flex-direction:column">`;
      h+=`<div class="contacts-toolbar">
        <div class="contacts-search-wrap">
          <svg class="ic" width="13" height="13" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="contacts-search-input" placeholder="Search cards..." value="${esc(state.panelCardSearch)}" oninput="setState({panelCardSearch:this.value})">
        </div>
        ${!state.addingCard&&!state.editingCardId?`<button class="tab-add-btn" onclick="setState({addingCard:true,editingCardId:null,tempCardDefault:false})"><svg class="ic" width="12" height="12" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Card</button>`:''}
      </div>`;
      h+=`<div class="panel-scroll" style="padding:12px 20px">`;
      if(state.addingCard){h+=`<div class="card-form">
        <div style="font-size:11px;font-weight:600;color:#2563eb;margin-bottom:8px">Add Card</div>
        <div class="card-form-grid">
          <select id="card-brand"><option>Visa</option><option>Mastercard</option><option>Amex</option><option>Discover</option></select>
          <input id="card-last4" placeholder="Last 4 digits" maxlength="4" oninput="this.value=this.value.replace(/\\D/g,'')">
          <input id="card-month" placeholder="MM (exp)" maxlength="2">
          <input id="card-year" placeholder="YYYY (exp)" maxlength="4">
          <input id="card-name" placeholder="Cardholder name" style="grid-column:span 2">
        </div>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#374151;margin-bottom:10px;cursor:pointer"><input type="checkbox" ${state.tempCardDefault?'checked':''} onchange="state.tempCardDefault=this.checked"> Set as default</label>
        <div style="display:flex;justify-content:flex-end;gap:6px"><button class="cbtn" onclick="setState({addingCard:false})">Cancel</button><button class="sbtn" onclick="addCard(${pc.id})">Save Card</button></div>
      </div>`;}
      if(!pcCards.length&&!state.addingCard){h+=`<div class="empty-msg">No cards on file.</div>`}
      else if(!filteredCards.length&&!state.addingCard){h+=`<div class="empty-msg">No cards match your search.</div>`}
      else{filteredCards.forEach(card=>{
        const expired=isExpired(card);
        if(state.editingCardId===card.id){h+=`<div class="card-form">
          <div style="font-size:11px;font-weight:600;color:#2563eb;margin-bottom:8px">Edit Card</div>
          <div class="card-form-grid">
            <select id="card-brand">${['Visa','Mastercard','Amex','Discover'].map(b=>`<option ${card.brand===b?'selected':''}>${b}</option>`).join('')}</select>
            <input id="card-last4" placeholder="Last 4 digits" maxlength="4" value="${card.last4}" oninput="this.value=this.value.replace(/\\D/g,'')">
            <input id="card-month" placeholder="MM (exp)" maxlength="2" value="${card.expMonth}">
            <input id="card-year" placeholder="YYYY (exp)" maxlength="4" value="${card.expYear}">
            <input id="card-name" placeholder="Cardholder name" style="grid-column:span 2" value="${esc(card.name)}">
          </div>
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#374151;margin-bottom:10px;cursor:pointer"><input type="checkbox" ${state.tempCardDefault?'checked':''} onchange="state.tempCardDefault=this.checked"> Set as default</label>
          <div style="display:flex;justify-content:flex-end;gap:6px"><button class="cbtn" onclick="setState({editingCardId:null})">Cancel</button><button class="sbtn" onclick="saveEditCard(${pc.id},'${card.id}')">Save</button></div>
        </div>`;}
        else{h+=`<div class="card-item">
          <span class="card-brand-pill ${brandCls(card.brand)}">${card.brand}</span>
          <div class="card-meta">
            <div class="card-num">•••• ${card.last4}${card.isDefault?`<span class="card-default-badge">Default</span>`:''}</div>
            <div class="card-sub ${expired?'card-exp-warn':''}">${card.name?esc(card.name)+' · ':''}<span>Exp ${card.expMonth}/${card.expYear}${expired?' · Expired':''}</span></div>
          </div>
          <div class="card-acts">
            ${!card.isDefault?`<button class="contact-act-btn" onclick="setDefaultCard(${pc.id},'${card.id}')">Set default</button>`:''}
            <button class="contact-act-btn" onclick="startEditCard(${pc.id},'${card.id}')">Edit</button>
            <button class="contact-act-btn danger" onclick="deleteCard(${pc.id},'${card.id}')">Delete</button>
          </div>
        </div>`;}
      });}
      h+=`</div></div>`;
    }

    // ── COLLECTION ACTIVITY TAB ───────────────────────────────────────────────
    else if(state.panelTab==='activity'){
      h+=`<div class="panel-tab-body">
        <div class="act-search"><div class="act-sr">
          <div class="act-siw"><svg class="ic" width="14" height="14" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" class="act-si" placeholder="Search collection notes..." value="${esc(state.panelNoteSearch)}" oninput="setState({panelNoteSearch:this.value})"></div>
          <button class="act-fb ${state.panelShowFilters?'active':''}" onclick="setState({panelShowFilters:!state.panelShowFilters})"><svg class="ic" width="12" height="12" viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg> Filters</button>
        </div></div>
        ${state.panelShowFilters?`<div class="act-fp">
          <div style="display:flex;align-items:center;gap:8px"><span class="fl">Date:</span><div class="act-fps">
            ${["all","7","30"].map(v=>`<button class="act-fpl ${state.panelDateFilter===v?'active':''}" onclick="setState({panelDateFilter:'${v}'})">${{all:"All time","7":"Last 7 days","30":"Last 30 days"}[v]}</button>`).join("")}
          </div></div>
          <div style="width:1px;height:16px;background:#e5e7eb"></div>
          <div style="display:flex;align-items:center;gap:8px"><span class="fl">User:</span><select class="act-fsel" onchange="setState({panelUserFilter:this.value})"><option value="all">All users</option>${pUsers.map(u=>`<option value="${esc(u)}" ${state.panelUserFilter===u?'selected':''}>${esc(u)}</option>`).join("")}</select></div>
        </div>`:""}
        <div class="act-nl">`;
      if(!filteredPNotes.length){h+=`<div class="empty-msg">No notes match your filters.</div>`}
      else{
        const fileIcon='<svg class="ic" width="14" height="14" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>';
        filteredPNotes.forEach((n,i)=>{
          const isHL=state.highlightNoteIdx===i;
          h+=`<div class="nc${isHL?' highlight':''}" id="hl-note-${i}">
            <div class="niw">${fileIcon}</div>
            <div class="nb"><div class="ns">${esc(n.subject)}</div><div class="nd">${esc(n.text)}</div></div>
            <div class="nm"><div><div class="na">${esc(n.by)}</div><div class="ndt">${n.date} · ${n.time}</div></div></div>
          </div>`;
        });
      }
      h+=`</div></div>`;
    }

    // ── LOCATIONS TAB ─────────────────────────────────────────────────────────
    else if(state.panelTab==='locations'){
      const locs=customerLocations[pc.id]||[];
      const locQ=state.panelLocationSearch.toLowerCase();
      const filteredLocs=locQ?locs.filter(l=>l.name.toLowerCase().includes(locQ)||l.address.toLowerCase().includes(locQ)||l.city.toLowerCase().includes(locQ)):locs;
      const locStatusClass=(s)=>({Active:'ls-active',Inactive:'ls-inactive',Hold:'ls-hold','Do Not Service':'ls-dns'}[s]||'ls-inactive');
      h+=`<div class="panel-tab-body" style="overflow:hidden;display:flex;flex-direction:column">`;
      h+=`<div class="contacts-toolbar">
        <div class="contacts-search-wrap">
          <svg class="ic" width="13" height="13" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="contacts-search-input" placeholder="Search locations..." value="${esc(state.panelLocationSearch)}" oninput="setState({panelLocationSearch:this.value})">
        </div>
      </div>`;
      h+=`<div class="panel-scroll" style="padding:14px 20px">`;
      if(!locs.length){h+=`<div class="empty-msg">No locations found.</div>`}
      else if(!filteredLocs.length){h+=`<div class="empty-msg">No locations match your search.</div>`}
      else{
        filteredLocs.forEach(loc=>{
          const locOnlyLabels=loc.labels.filter(l=>!pc.labels.includes(l));
          h+=`<div class="loc-card">
            <div class="loc-card-header">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1;min-width:0">
                <div class="loc-card-name">${esc(loc.name)}</div>
                ${locOnlyLabels.map(l=>{const lc=LABEL_COLORS[l]||LABEL_COLORS["New Customer"];return`<span class="badge" style="background:${lc.bg};color:${lc.text};border:1px solid ${lc.border}40">${esc(l)}</span>`}).join("")}
              </div>
              <span class="location-status-badge ${locStatusClass(loc.status)}" style="flex-shrink:0">${esc(loc.status)}</span>
            </div>
            <a class="loc-card-addr" href="https://maps.google.com/?q=${encodeURIComponent(loc.address+', '+loc.city)}" target="_blank">${esc(loc.address)}, ${esc(loc.city)}</a>
            <div class="loc-card-stats">
              <span><span class="loc-card-stat-val">${loc.containers}</span> containers</span>
              <span><span class="loc-card-stat-val">${loc.activeOrders}</span> active orders</span>
              <span><span class="loc-card-stat-val">${loc.totalOrders}</span> total orders</span>
            </div>
          </div>`;
        });
      }
      h+=`</div></div>`;
    }

    // ── STICKY BOTTOM BAR ─────────────────────────────────────────────────────
    h+=`<div class="panel-sticky">
      <button class="panel-pay-btn">Take Payment</button>
      <button class="panel-addnote-btn" onclick="setState({panelAddOpen:!state.panelAddOpen})">
        <svg class="ic" width="14" height="14" viewBox="0 0 24 24" style="stroke:currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Note
      </button>
    </div>`;
    // Add note flyup
    if(state.panelAddOpen){
      h+=`<div class="ano" style="position:absolute;bottom:56px;left:0;right:0"><h4>New Collection Note</h4><input type="text" placeholder="Subject"><textarea rows="3" placeholder="Add details..."></textarea><div class="ano-acts"><button class="cbtn" onclick="setState({panelAddOpen:false})">Cancel</button><button class="sbtn" onclick="setState({panelAddOpen:false})">Save</button></div></div>`;
    }
  }
  h+=`</div>`;

  const _scrollEls=[...document.querySelectorAll('.table-wrap > div')];
  const _scrollX=_scrollEls.map(el=>el.scrollLeft);
  const _panelScroll=document.querySelector('.panel-scroll');
  const _panelY=_panelScroll?_panelScroll.scrollTop:0;
  document.getElementById("app").innerHTML=h;
  document.querySelectorAll('.table-wrap > div').forEach((el,i)=>{if(i<_scrollX.length)el.scrollLeft=_scrollX[i];});
  const _newPanel=document.querySelector('.panel-scroll');
  if(_newPanel)_newPanel.scrollTop=_panelY;
}

function setState(p){Object.assign(state,p);render()}
function toggleBucket(k){setState({selectedBucket:state.selectedBucket===k?null:k})}
function doSort(k){if(state.sortKey===k){if(state.sortDir==="asc")setState({sortDir:"desc"});else setState({sortKey:"",sortDir:"asc"})}else setState({sortKey:k,sortDir:"asc"})}
function toggleRow(id){setState({selectedRows:toggleArr(state.selectedRows,id)})}
function toggleAll(){const f=getFiltered();setState({selectedRows:f.every(c=>state.selectedRows.includes(c.id))?[]:f.map(c=>c.id)})}
function toggleFilter(key,val){const o={};o[key]=toggleArr(state[key],val);setState(o)}
function toggleLocationExpand(id){setState({expandedLocations:toggleArr(state.expandedLocations,id)})}
function toggleKebab(id){setState({kebabOpen:state.kebabOpen===id?null:id})}
function saveContact(id){const c=customers.find(x=>x.id===id);if(c){c.contact={name:document.getElementById("ec-name").value,email:document.getElementById("ec-email").value,phone:document.getElementById("ec-phone").value}}setState({editingContact:null})}
function handleBatchAction(sel){if(!sel.value)return;const action=sel.value;sel.value='';const names=customers.filter(c=>state.selectedRows.includes(c.id)).map(c=>c.name);alert(action==='statement'?`Send Statement to:\n${names.join('\n')}`:action==='suspend'?`Suspend:\n${names.join('\n')}`:action==='resume'?`Resume:\n${names.join('\n')}`:'');}
function clearAll(){setState({selectedBucket:null,businessFilter:[],labelFilter:[],serviceFilter:[],commFilter:[],termsFilter:[],statusFilter:[],policyFilter:[],overdueMin:"",overdueMax:"",daysPastDue:"",search:"",collDateFrom:"",collDateTo:"",customerFilter:"",billingContactFilter:""})}
function fmtPhoneInput(el){let v=el.value.replace(/\D/g,'');if(v.length>10)v=v.slice(0,10);let f='';if(v.length>0)f=v.slice(0,3);if(v.length>3)f+='-'+v.slice(3,6);if(v.length>6)f+='-'+v.slice(6,10);el.value=f}
function pinContact(cid,ctId){const key=cid+'_ct_'+ctId;const orig=(customerContacts[cid]||[]).find(c=>c.id===ctId)||(state.contactsData[cid+'_added']||[]).find(c=>c.id===ctId)||{};const current=state.contactsData[key]||orig;const o={};o[key]={...current,pinned:!current.pinned,role:!current.pinned?'Contact':''};setState({contactsData:Object.assign({},state.contactsData,o)})}
function saveBillingNotes(id){const o={};o[id+'_bn']=state.tempBillingNotes;const newData=Object.assign({},state.contactsData,o);setState({contactsData:newData,editingBillingNotes:false})}
function saveAccountNotes(id){const o={};o[id+'_an']=state.tempAccountNotes;const newData=Object.assign({},state.contactsData,o);setState({contactsData:newData,editingAccountNotes:false})}
function addNewContact(cid){const name=document.getElementById('nc-name').value.trim();if(!name)return;const phone=document.getElementById('nc-phone').value.trim();const newCt={id:'nc-'+Date.now(),name,title:document.getElementById('nc-title').value.trim(),phone,ext:'',email:document.getElementById('nc-email').value.trim(),pinned:false,role:'',disabled:false};const key=cid+'_added';const existing=state.contactsData[key]||[];const o={};o[key]=[...existing,newCt];setState({contactsData:Object.assign({},state.contactsData,o),addingContact:false})}
function saveContactEdit(cid,ctId){const name=document.getElementById('ec2-name').value.trim();if(!name)return;const phoneRaw=document.getElementById('ec2-phone').value.trim();const phone=phoneRaw.replace(/\s*ext\.?\s*(\d+)/i,'').trim();const ext=(phoneRaw.match(/ext\.?\s*(\d+)/i)||[])[1]||'';const key=cid+'_ct_'+ctId;const o={};const orig=(customerContacts[cid]||[]).find(c=>c.id===ctId)||{};o[key]={...orig,name,title:document.getElementById('ec2-title').value.trim(),phone,ext,email:document.getElementById('ec2-email').value.trim()};setState({contactsData:Object.assign({},state.contactsData,o),editingContactId:null})}
function toggleContactDisabled(cid,ctId){const key=cid+'_ct_'+ctId;const orig=(customerContacts[cid]||[]).find(c=>c.id===ctId)||{};const current=state.contactsData[key]||orig;const o={};o[key]={...current,disabled:!current.disabled};setState({contactsData:Object.assign({},state.contactsData,o)})}

render();
</script>
